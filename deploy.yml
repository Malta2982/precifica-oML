name: Deploy Edge Function

on:
  push:
    paths:
      - 'supabase/functions/**'
    branches:
      - main
      - principal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ml-search function
        run: |
          supabase functions deploy ml-search --project-ref btvaccofypcehaqxaxme
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
